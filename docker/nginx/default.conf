server {
    listen 80;
    server_name ntkfashion.me www.ntkfashion.me;
    root /var/www/html;
    index index.php dashboard.php;
    client_max_body_size 12M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp)$ {
        expires 30d;
    }
    location ~ /\.(env|git) { deny all; }
    location ~ /config/ { deny all; }
}

server {
    listen 80;
    server_name api.ntkfashion.me;
    root /var/www/html/api;
    index index.php;

    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}

server {
    listen 80;
    server_name admin.ntkfashion.me;
    root /var/www/html/admin;
    index dashboard.php;

    location / { try_files $uri $uri/ /dashboard.php?$query_string; }

    # Route /api/ PHP requests directly to the sibling api folder using a top-level regex to avoid nested alias bugs
    location ~ ^/api/(.+\.php)$ {
        alias /var/www/html/api/$1;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        include fastcgi_params;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}

server {
    listen 8080;
    server_name staging.ntkfashion.me;
    root /var/www/html;
    index index.php;

    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        fastcgi_pass php-staging:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
