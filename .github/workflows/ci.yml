name: CI Pipeline - PHP Lint & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.0'
        extensions: pdo, pdo_mysql, mysqli
        coverage: none

    - name: 🔍 PHP Syntax Checker (Lint)
      run: |
        echo "Bắt đầu kiểm tra lỗi cú pháp PHP..."
        find src/ -name "*.php" -print0 | xargs -0 -n1 php -l
        echo "✅ Không phát hiện lỗi cú pháp nghiêm trọng!"

    - name: 🐳 Test Docker Build
      run: |
        echo "Kiểm tra xem Dockerfile có build thành công không..."
        docker compose build php
        echo "✅ Build Docker thành công!"
